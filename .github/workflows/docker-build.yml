# =============================================================================
# docker-build.yml
#
# Builds and pushes the custom Android Docker image to GitHub Container Registry.
# Only triggered when the Dockerfile or config.sh changes — the image only needs
# to be rebuilt when the build environment itself changes, not on every app push.
#
# The image is then referenced by capacitor-android.yml as:
#   ghcr.io/${{ github.repository_owner }}/holy-echoes-android:latest
# =============================================================================

name: Build Android Docker Image

on:
  push:
    branches: [main, develop, feature/github-actions-ci]
    paths:
      - 'docker/android.Dockerfile'
      - 'config.sh'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/android.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/holy-echoes-android:latest
            ghcr.io/${{ github.repository_owner }}/holy-echoes-android:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
